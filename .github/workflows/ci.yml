name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: pip install -e ".[dev]"

      - name: Ruff check
        run: ruff check src tests

      - name: Ruff format
        run: ruff format --check src tests

      - name: Mypy
        run: mypy src

      - name: Pytest
        env:
          MPLBACKEND: Agg
        run: pytest
